plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.abualhassan.number_hunter"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    // نخلي الجافا والكتلن نفس النسخة 17
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.abualhassan.number_hunter"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            // شلت هذا السطر: signingConfig signingConfigs.debug 
            // حتى يطلع APK بدون توقيع اسمه app-release-unsigned.apk
        }
    }
}

flutter {
    source '../..'
}
